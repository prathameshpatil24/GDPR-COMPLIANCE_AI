  mode: compliance_assessment
  title: Mobile fitness app with location
  difficulty: hard
  category: special-categories
  system_description: 'iOS/Android app tracks runs with GPS always-on when "workout mode" is enabled. We also pull heart rate
    from Apple Health.

    Backend buckets are multi-region; backups land in us-east-1. Product wants to sell "aggregated heatmaps" to an insurer
    partner — spec still vague.

    No DPIA doc in Drive. Consent screen is a single OK on first launch.

    '
