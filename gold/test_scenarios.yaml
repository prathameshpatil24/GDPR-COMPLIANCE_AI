  - '6'
  - '7'
  - '13'
  - '21'
  - '28'
  - '30'
  - '32'
  - '44'
  - '46'
  expected_documents:
  - dpia
  - ropa
  - checklist
  - consent_flow
  - retention_policy
  notes: Should surface Mailchimp as processor, consent/Art.13 gaps, tracking defaults.
