- id: SC-C-001
  mode: compliance_assessment
  title: SaaS newsletter platform
  difficulty: medium
  category: consent
  system_description: 'We''re shipping a B2B newsletter product. Signup is a single field for work email plus optional first
    name.

    Mailchimp sends the campaigns; we only sync lists via their API. DB is Postgres in eu-central-1.

    Legal never finished a DPA addendum with them. Privacy page mentions "marketing" in one bullet.

    Open/click tracking is on by default. Unsubscribe is one click but also downgrades the whole account.

    '
  expected_findings:
  - area: consent
    min_status: at_risk
  - area: processor
    min_status: at_risk
  - area: transparency
    min_status: at_risk
  expected_articles:
