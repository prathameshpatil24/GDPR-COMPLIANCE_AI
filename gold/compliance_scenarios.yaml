# Gold scenarios for compliance assessment mode (v2). Freetext system descriptions.
scenarios:
  - id: SC-C-001
    title: SaaS email marketing platform
    difficulty: medium
    system_description: >
      B2B SaaS sends promotional emails to EU subscribers collected via web signup.
      We store email, name, and engagement metrics in PostgreSQL in Frankfurt.
      Consent checkboxes are bundled with terms of service. Unsubscribe link is in the footer.
      We use a US-based delivery vendor as processor under a DPA.
    expected_findings:
      - consent
      - data_minimization
      - transfers
    expected_articles:
      - "Art. 6 GDPR"
      - "Art. 7 GDPR"
      - "Art. 21 GDPR"
    expected_documents:
      - dpia
      - ropa
      - checklist
      - consent_flow
      - retention_policy

  - id: SC-C-002
    title: Mobile app with location tracking
    difficulty: hard
    system_description: >
      Fitness app for EU users collects precise GPS location every 5 minutes when the app is open,
      plus heart rate from wearables. Data is processed for workout maps and sold in aggregated
      form to an ad partner. Backend is multi-region with backups in the US.
    expected_findings:
      - consent
      - dpia
      - transfers
      - data_minimization
    expected_articles:
      - "Art. 9 GDPR"
      - "Art. 35 GDPR"
      - "Art. 44 GDPR"
    expected_documents:
      - dpia
      - ropa
      - checklist
      - consent_flow
      - retention_policy

  - id: SC-C-003
    title: E-commerce with payment processing
    difficulty: medium
    system_description: >
      Online shop stores customer accounts with addresses and order history. Payments go through
      a PSP; we tokenize cards only. Logs with IP and user agent retained 18 months on NVMe in the EU.
      Incident response runbook exists but breach notification to DPA is not documented.
    expected_findings:
      - security
      - breach
      - processor
    expected_articles:
      - "Art. 28 GDPR"
      - "Art. 32 GDPR"
      - "Art. 33 GDPR"
    expected_documents:
      - dpia
      - ropa
      - checklist
      - retention_policy

  - id: SC-C-004
    title: AI chatbot for customer queries
    difficulty: hard
    system_description: >
      Public website chatbot answers product questions using an LLM. Conversations may include
      order numbers and email addresses typed by users. Logs are used to fine-tune the model weekly.
      No human review for automated replies about refunds above 500 EUR.
    expected_findings:
      - automated
      - transparency
      - ai
    expected_articles:
      - "Art. 22 GDPR"
      - "Art. 13 GDPR"
    expected_documents:
      - dpia
      - ropa
      - checklist
      - consent_flow

  - id: SC-C-005
    title: HR system for EU employees
    difficulty: hard
    system_description: >
      Cloud HRIS holds personnel files, payroll, performance reviews, and optional self-reported
      health accommodations. Data stored in Ireland. Line managers can export CSVs to local laptops
      without DLP. Retention after termination not defined.
    expected_findings:
      - employment
      - special_category
      - retention
    expected_articles:
      - "Art. 9 GDPR"
      - "Art. 5 GDPR"
      - "Art. 32 GDPR"
    expected_documents:
      - dpia
      - ropa
      - checklist
      - retention_policy

