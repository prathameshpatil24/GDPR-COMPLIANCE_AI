    difficulty: hard
    system_description: >
      Hospital patient portal shows lab results and messages to clinicians. Authentication is
      password-only; MFA not enforced. Audit logs for access are kept 30 days. Data hosted with
      a US cloud provider under SCCs.
    expected_findings:
      - security
      - special_category
      - transfers
    expected_articles:
      - "Art. 9 GDPR"
      - "Art. 32 GDPR"
      - "Art. 15 GDPR"
    expected_documents:
      - dpia
      - ropa
      - checklist
      - retention_policy

  - id: SC-C-007
    title: IoT smart home device
    difficulty: medium
    system_description: >
      Smart speaker records voice commands processed in the cloud for intent recognition.
      Device marketed to families; parental controls are optional. Firmware updates over cleartext
      HTTP in legacy models. Telemetry shared with analytics vendor in Singapore.
    expected_findings:
      - children
      - security
      - transfers
    expected_articles:
